<body class="bg-bg-page min-h-screen flex items-center justify-center font-body-text antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Container Content -->
<main class="w-full max-w-[420px] px-4">
<!-- Level 1 Card (Operational Wrapper) -->
<div class="bg-surface rounded-lg p-card-padding-lg border border-black/5 shadow-[0_6px_18px_rgba(0,0,0,0.08)] flex flex-col gap-8">
<!-- Branding Header -->
<header class="flex flex-col items-center text-center gap-2">
<div class="bg-surface-container-high w-16 h-16 rounded-full flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-[2rem] text-primary" style="font-variation-settings: 'FILL' 1;">storefront</span>
</div>
<h1 class="font-section-heading text-section-heading text-primary tracking-tight">Atacadão Cotações</h1>
<p class="font-body-text text-body-text text-text-muted">Painel Administrativo Operacional</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-gutter">
<!-- Field: Username -->
<div class="flex flex-col gap-base">
<label class="font-table-header text-table-header text-on-surface-variant" for="username">Usuário Operador</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted group-focus-within:text-primary transition-colors">person</span>
<input autocomplete="username" class="w-full bg-surface-bright border border-outline-variant rounded py-2.5 pl-10 pr-4 font-body-text text-body-text text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-text-muted/60" id="username" placeholder="Ex: OP-1049" required="" type="text"/>
</div>
</div>
<!-- Field: Password -->
<div class="flex flex-col gap-base">
<label class="font-table-header text-table-header text-on-surface-variant" for="password">Senha de Acesso</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted group-focus-within:text-primary transition-colors">lock</span>
<input autocomplete="current-password" class="w-full bg-surface-bright border border-outline-variant rounded py-2.5 pl-10 pr-4 font-body-text text-body-text text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-text-muted/60" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Actions / Recovery -->
<div class="flex items-center justify-between pt-1 pb-2">
<label class="flex items-center gap-2 cursor-pointer">
<input class="rounded text-primary border-outline-variant focus:ring-primary focus:ring-offset-0 bg-surface" type="checkbox"/>
<span class="font-technical-tag text-technical-tag text-text-muted">Lembrar credencial</span>
</label>
<a class="font-technical-tag text-technical-tag text-primary hover:text-surface-tint transition-colors hover:underline" href="#">Esqueceu a senha?</a>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary hover:bg-surface-tint text-on-primary font-table-header text-table-header py-3 rounded shadow-sm transition-all flex items-center justify-center gap-2 group active:scale-[0.98]" type="submit">
                    Acessar Sistema
                    <span class="material-symbols-outlined text-[1.1rem] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Badge -->
<footer class="mt-2 pt-4 border-t border-outline-variant flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[1rem] text-status-danger" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<p class="font-technical-tag text-technical-tag text-text-muted tracking-wide uppercase">
                    Acesso Exclusivo para Administradores
                </p>
</footer>
</div>
</main>
</body></html>
