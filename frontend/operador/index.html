<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operador - Cotação Online Atacadão</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #27ae60;
            --brand-secondary: #db7612;
            --bg-page: #f0f4f8;
            --bg-surface: #ffffff;
            --text-main: #2c3e50;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
        }

        .navbar {
            background-color: var(--brand-primary);
            color: white;
            padding: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            border: none;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .btn-action {
            background: linear-gradient(90deg, #db7612, #c66a0f);
            color: white;
            font-weight: 700;
            border: none;
        }

        .btn-action:hover {
            opacity: 0.9;
            color: white;
        }

        .table-header {
            font-weight: 700;
            font-size: 0.9rem;
        }

        #total-row {
            color: var(--brand-secondary);
            font-weight: 700;
            font-size: 1.5rem;
        }

        .search-results {
            position: absolute;
            z-index: 1000;
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 8px 8px;
            display: none;
        }

        .search-item {
            padding: 10px;
            cursor: pointer;
        }

        .search-item:hover {
            background-color: #f8f9fa;
        }

        /* PDF Template Styles (Hidden from screen) */
        #pdf-export-container {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 800px;
            background: white;
            padding: 20px;
            color: black;
        }

        .barcode {
            font-family: 'Libre Barcode 39', cursive;
            font-size: 42px;
            line-height: 1;
        }

        .pdf-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .pdf-table th, .pdf-table td {
            border: 1px solid #000;
            padding: 5px;
            text-align: left;
            font-size: 12px;
        }

        .pdf-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <span class="navbar-brand mb-0 h1">ATACADÃO - COTAÇÃO ONLINE</span>
            <div class="d-flex align-items-center">
                <small id="current-date"></small>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Search Section -->
        <div class="card p-4">
            <h3>Buscar Produto</h3>
            <div class="position-relative">
                <input type="text" id="product-search" class="form-control form-control-lg" placeholder="Digite o código (MERC) ou nome do produto...">
                <div id="search-results" class="search-results"></div>
            </div>
        </div>

        <!-- Items Table -->
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Itens da Cotação</h3>
                <button id="clear-quotation" class="btn btn-outline-danger btn-sm">Limpar Cotação</button>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr class="table-header">
                            <th>MERC</th>
                            <th>DIG</th>
                            <th>DESCRIÇÃO</th>
                            <th>EMBALAGEM</th>
                            <th style="width: 100px;">QTD</th>
                            <th>VALOR UNIT.</th>
                            <th>TOTAL</th>
                            <th class="text-center">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="quotation-body">
                        <!-- Items will be injected here -->
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="6" class="text-end align-middle"><strong>TOTAL GERAL:</strong></td>
                            <td id="total-row" colspan="2">R$ 0,00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <div class="text-end mt-4">
                <button id="generate-pdf" class="btn btn-action btn-lg px-5">GERAR FATURAMENTO (PDF)</button>
            </div>
        </div>
    </div>

    <!-- PDF Hidden Template -->
    <div id="pdf-export-container">
        <div class="pdf-header">
            <div>
                <h2 style="margin: 0; color: #27ae60;">ATACADÃO</h2>
                <p style="margin: 0; font-size: 14px;">PEDIDO PARA FATURAR</p>
            </div>
            <div style="text-align: right;">
                <p id="pdf-date" style="margin: 0; font-size: 12px;"></p>
                <p id="pdf-time" style="margin: 0; font-size: 12px; font-weight: bold;"></p>
            </div>
        </div>
        
        <table class="pdf-table">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Dig</th>
                    <th>Descrição</th>
                    <th>Embalagem</th>
                    <th>Qtd</th>
                    <th>Valor</th>
                    <th>Total</th>
                    <th>Cód. Barras</th>
                </tr>
            </thead>
            <tbody id="pdf-body">
                <!-- Items will be injected here -->
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="6" style="text-align: right; font-weight: bold;">TOTAL:</td>
                    <td id="pdf-total" style="font-weight: bold;"></td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>

    <!-- JS Libs -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- PDF Export Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- App Logic -->
    <script src="../assets/js/operator.js"></script>

    <script>
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
    </script>
</body>
</html>
